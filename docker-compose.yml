services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: profilmanager
      POSTGRES_PASSWORD: profilmanager
      POSTGRES_DB: profilmanager
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U profilmanager"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/data/uploads

volumes:
  postgres_data:
  uploads_data:
