{% extends 'base.html' %}
{% block content %}
<div class="card">
  <div class="card-header">
    <a href="{{ url_for('users.create') }}" class="btn btn-primary btn-sm">Neuer Benutzer</a>
  </div>
  <div class="card-body table-responsive p-0">
    <table class="table table-hover">
      <thead><tr><th>Username</th><th>Email</th><th>Kürzel</th><th>Rolle</th><th>Status</th><th></th></tr></thead>
      <tbody>
      {% for u in pagination.items %}
      <tr>
        <td>{{ u.username }}</td><td>{{ u.email }}</td><td>{{ u.shortcode or '-' }}</td><td>{{ u.role.name }}</td><td>{{ 'aktiv' if u.active else 'inaktiv' }}</td>
        <td>
          <a class="btn btn-sm btn-secondary" href="{{ url_for('users.edit', user_id=u.id) }}">Bearbeiten</a>
          <form method="post" action="{{ url_for('users.delete', user_id=u.id) }}" style="display:inline"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="btn btn-sm btn-danger">Löschen</button></form>
        </td>
      </tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
