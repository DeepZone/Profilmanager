{% extends 'base.html' %}
{% block content %}
<div class="card">
  <div class="card-header"><h3 class="card-title">Alle Profile</h3></div>
  <div class="card-body table-responsive p-0">
    <table class="table table-striped">
      <thead><tr><th>Name</th><th>Owner ID</th><th>Version</th><th></th></tr></thead>
      <tbody>
      {% for p in pagination.items %}
        <tr><td>{{ p.name }}</td><td>{{ p.user_id }}</td><td>{{ p.current_version }}</td><td><a class="btn btn-sm btn-info" href="{{ url_for('profiles.detail', profile_id=p.id) }}">Öffnen</a></td></tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
