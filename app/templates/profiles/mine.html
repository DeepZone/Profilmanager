{% extends 'base.html' %}
{% block content %}
<div class="card">
  <div class="card-header">
    <form class="form-inline" method="get">
      <input class="form-control mr-2" name="q" placeholder="Suche (Name/Provider)" value="{{ q }}">
      <select class="form-control mr-2" name="sort">
        <option value="provider" {% if sort == 'provider' %}selected{% endif %}>Provider</option>
        <option value="name" {% if sort == 'name' %}selected{% endif %}>Name</option>
        <option value="updated_at" {% if sort == 'updated_at' %}selected{% endif %}>Aktualisiert</option>
        <option value="current_version" {% if sort == 'current_version' %}selected{% endif %}>Version</option>
      </select>
      <select class="form-control mr-2" name="order">
        <option value="asc" {% if order == 'asc' %}selected{% endif %}>Aufsteigend</option>
        <option value="desc" {% if order == 'desc' %}selected{% endif %}>Absteigend</option>
      </select>
      <button class="btn btn-primary">Anwenden</button>
    </form>
  </div>
  <div class="card-body table-responsive p-0">
    <table class="table table-hover">
      <thead><tr><th>Provider</th><th>Name</th><th>Landesvorwahl</th><th>Version</th><th>Aktualisiert</th><th></th></tr></thead>
      <tbody>
      {% for p in pagination.items %}
        <tr>
          <td>{{ p.provider or '-' }}</td>
          <td>{{ p.name }}</td>
          <td>{{ p.dial_code or '-' }}</td>
          <td>{{ p.current_version }}</td>
          <td>{{ p.updated_at }}</td>
          <td><a class="btn btn-sm btn-info" href="{{ url_for('profiles.detail', profile_id=p.id) }}">Details</a></td>
        </tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
